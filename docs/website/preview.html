<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biblion Graph Preview</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f7f3e9;
        --ink: #143642;
        --accent: #cda15c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top, rgba(205, 161, 92, 0.18), transparent 30%),
          linear-gradient(180deg, #fcfaf4 0%, #f1ebdd 100%);
        color: var(--ink);
      }

      #root {
        min-height: 100vh;
      }

      .page-shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(260px, 360px) 1fr;
        gap: 24px;
        padding: 24px;
      }

      .intro-panel,
      .graph-panel {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(20, 54, 66, 0.12);
        border-radius: 18px;
        box-shadow: 0 18px 40px rgba(20, 54, 66, 0.08);
      }

      .intro-panel {
        padding: 24px;
        align-self: start;
      }

      .selected-node-panel {
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid rgba(20, 54, 66, 0.12);
      }

      .selected-node-panel h2,
      .graph-card-header h2 {
        margin: 0 0 12px;
      }

      .selected-node-meta {
        margin-bottom: 12px;
        color: #7d5a22;
        font-size: 0.92rem;
      }

      .sequence-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 20px;
      }

      .sequence-button {
        padding: 12px 16px;
        border: 1px solid rgba(20, 54, 66, 0.16);
        border-radius: 999px;
        background: linear-gradient(180deg, #143642 0%, #244c5a 100%);
        color: #f7f3e9;
        font: inherit;
        cursor: pointer;
      }

      .sequence-button-secondary {
        background: linear-gradient(180deg, #efe4cb 0%, #e4d4af 100%);
        color: #143642;
      }

      .sequence-button-active {
        background: linear-gradient(180deg, #cda15c 0%, #b38132 100%);
        color: #143642;
      }

      .sequence-status {
        margin-top: 14px;
        color: #7d5a22;
        font-size: 0.92rem;
      }

      .graph-panel {
        display: grid;
        gap: 24px;
        padding: 24px;
      }

      .graph-card {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
        align-items: stretch;
      }

      .graph-card-header {
        align-self: start;
        max-width: 760px;
      }

      .graph-canvas {
        min-height: 640px;
        border-radius: 14px;
        overflow: hidden;
        background: linear-gradient(180deg, rgba(247, 243, 233, 0.92), rgba(241, 235, 221, 0.78));
        border: 1px solid rgba(20, 54, 66, 0.08);
      }

      .eyebrow {
        margin: 0 0 12px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.72rem;
        color: #7d5a22;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      p {
        margin: 0;
        line-height: 1.6;
      }

      @media (max-width: 900px) {
        .page-shell {
          grid-template-columns: 1fr;
        }

        .graph-card {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import React, { useEffect, useRef, useState } from "https://esm.sh/react@18.3.1";
      import ReactDOM from "https://esm.sh/react-dom@18.3.1/client";
      import cytoscape from "https://esm.sh/cytoscape@3.30.2";

      const overviewSequence = ["biblion", "vision", "architecture", "development", "publications"];
      const autoplayIntervalMs = 1200;
      const overviewSequenceEdges = ["e1", "e2", "e3", "e4"];

      const overviewNodes = [
        { data: { id: "biblion", label: "Biblion", category: "Platform", summary: "Digital Humanities platform centered on preservation, scholarship, and responsible AI." }, position: { x: 120, y: 220 } },
        { data: { id: "vision", label: "Vision", category: "Document", summary: "Defines the long-term purpose and intellectual direction of the project." }, position: { x: 380, y: 220 } },
        { data: { id: "architecture", label: "Architecture", category: "Document", summary: "Describes the system structure, module boundaries, and implementation shape." }, position: { x: 640, y: 220 } },
        { data: { id: "development", label: "Development", category: "Workflow", summary: "Tracks active engineering notes, procedures, and ongoing implementation work." }, position: { x: 900, y: 220 } },
        { data: { id: "publications", label: "Publications", category: "Outcome", summary: "Represents the scholarly outputs the platform is intended to support." }, position: { x: 1160, y: 220 } }
      ];

      const overviewEdges = [
        { data: { id: "e1", source: "biblion", target: "vision" } },
        { data: { id: "e2", source: "vision", target: "architecture" } },
        { data: { id: "e3", source: "architecture", target: "development" } },
        { data: { id: "e4", source: "development", target: "publications" } }
      ];

      const principlesNodes = [
        { data: { id: "principles", label: "Guiding Principles", category: "Vision", summary: "Core commitments that govern how Biblion applies technology to historical materials." }, position: { x: 640, y: 350 } },
        { data: { id: "preservation", label: "Preservation Before Convenience", category: "Principle", summary: "Source material should remain recoverable, traceable, and documented whenever possible." }, position: { x: 640, y: 110 } },
        { data: { id: "scholarship", label: "Scholarship Before Automation", category: "Principle", summary: "Automation supports scholarship; human understanding remains central." }, position: { x: 980, y: 260 } },
        { data: { id: "documentation", label: "Documentation Before Assumption", category: "Principle", summary: "Knowledge should not exist only in source code; decisions and context must be recorded." }, position: { x: 860, y: 570 } },
        { data: { id: "community", label: "Community Before Individual", category: "Principle", summary: "Meaningful preservation depends on contributions from many disciplines." }, position: { x: 420, y: 570 } },
        { data: { id: "stewardship", label: "Stewardship Before Ownership", category: "Principle", summary: "Historical texts are treated as shared human inheritance, not possessions." }, position: { x: 300, y: 260 } }
      ];

      const principlesEdges = [
        { data: { id: "p1", source: "principles", target: "preservation" } },
        { data: { id: "p2", source: "principles", target: "scholarship" } },
        { data: { id: "p3", source: "principles", target: "documentation" } },
        { data: { id: "p4", source: "principles", target: "community" } },
        { data: { id: "p5", source: "principles", target: "stewardship" } }
      ];

      const principlesElements = [...principlesNodes, ...principlesEdges];

      const stylesheet = [
        {
          selector: "node",
          style: {
            "background-color": "#143642",
            shape: "round-rectangle",
            label: "data(label)",
            color: "#f7f3e9",
            "text-valign": "center",
            "text-halign": "center",
            "text-wrap": "wrap",
            "text-max-width": 188,
            "font-size": "13px",
            width: 220,
            height: 124,
            "border-width": 2,
            "border-color": "#cda15c"
          }
        },
        {
          selector: "edge",
          style: {
            width: 2,
            "line-color": "#9cafb7",
            "target-arrow-color": "#9cafb7",
            "target-arrow-shape": "triangle",
            "curve-style": "bezier"
          }
        },
        {
          selector: ".sequence-active",
          style: {
            "background-color": "#cda15c",
            color: "#143642",
            "border-color": "#7d5a22",
            "border-width": 4
          }
        },
        {
          selector: ".sequence-edge",
          style: {
            width: 4,
            "line-color": "#cda15c",
            "target-arrow-color": "#cda15c"
          }
        }
      ];

      const overviewLayout = { name: "preset", fit: true, padding: 24 };

      const principlesLayout = { name: "preset", fit: true, padding: 30 };

      function CytoscapeCanvas({ elements, layoutConfig, onNodeSelect, title }) {
        const containerRef = useRef(null);
        const zoomMultiplier = title === "Guiding Principles" ? 1.06 : 1.02;

        useEffect(() => {
          if (!containerRef.current) {
            return undefined;
          }

          const cy = cytoscape({
            container: containerRef.current,
            elements,
            style: stylesheet,
            layout: layoutConfig
          });

          cy.fit(cy.elements(), 18);
          cy.zoom(cy.zoom() * zoomMultiplier);
          cy.center();

          const handleNodeTap = (event) => {
            onNodeSelect({ graphTitle: title, ...event.target.data() });
          };

          cy.on("tap", "node", handleNodeTap);

          return () => {
            cy.off("tap", "node", handleNodeTap);
            cy.destroy();
          };
        }, [elements, layoutConfig, onNodeSelect, title, zoomMultiplier]);

        return React.createElement("div", {
          ref: containerRef,
          style: { width: "100%", height: "100%" }
        });
      }

      function GraphCard({ title, description, elements, layoutConfig, onNodeSelect }) {

        return React.createElement(
          "article",
          { className: "graph-card" },
          React.createElement(
            "header",
            { className: "graph-card-header" },
            React.createElement("p", { className: "eyebrow" }, "Static Graph View"),
            React.createElement("h2", null, title),
            React.createElement("p", null, description)
          ),
          React.createElement(
            "div",
            { className: "graph-canvas", "aria-label": title },
            React.createElement(CytoscapeCanvas, {
              elements,
              layoutConfig,
              onNodeSelect,
              title
            })
          )
        );
      }

      function App() {
        const [selectedNode, setSelectedNode] = useState(null);
        const [sequenceStep, setSequenceStep] = useState(0);
        const [isAutoplaying, setIsAutoplaying] = useState(false);

        useEffect(() => {
          if (!isAutoplaying) {
            return undefined;
          }

          const timerId = window.setInterval(() => {
            setSequenceStep((currentStep) => (currentStep + 1) % overviewSequence.length);
          }, autoplayIntervalMs);

          return () => {
            window.clearInterval(timerId);
          };
        }, [isAutoplaying]);

        const highlightedNodeIds = new Set(overviewSequence.slice(0, sequenceStep + 1));
        const highlightedEdgeIds = new Set(overviewSequenceEdges.slice(0, sequenceStep));

        const overviewElements = [
          ...overviewNodes.map((node) => ({
            ...node,
            classes: highlightedNodeIds.has(node.data.id) ? "sequence-active" : ""
          })),
          ...overviewEdges.map((edge) => ({
            ...edge,
            classes: highlightedEdgeIds.has(edge.data.id) ? "sequence-edge" : ""
          }))
        ];

        const handleAdvanceSequence = () => {
          setSequenceStep((currentStep) => (currentStep + 1) % overviewSequence.length);
        };

        const handleResetSequence = () => {
          setSequenceStep(0);
        };

        const handleToggleAutoplay = () => {
          setIsAutoplaying((currentValue) => !currentValue);
        };

        return React.createElement(
          "main",
          { className: "page-shell" },
          React.createElement(
            "section",
            { className: "intro-panel" },
            React.createElement("p", { className: "eyebrow" }, "Biblion Website Prototype"),
            React.createElement("h1", null, "Minimal Cytoscape Graph"),
            React.createElement(
              "p",
              null,
              "Static React example using predefined node and edge arrays. Node clicks promote the selected node data into parent state."
            ),
            React.createElement(
              "div",
              { className: "sequence-controls" },
              React.createElement(
                "button",
                { className: "sequence-button", type: "button", onClick: handleAdvanceSequence },
                "Advance Overview Sequence"
              ),
              React.createElement(
                "button",
                {
                  className: "sequence-button sequence-button-secondary",
                  type: "button",
                  onClick: handleResetSequence
                },
                "Reset Sequence"
              ),
              React.createElement(
                "button",
                {
                  className: `sequence-button ${isAutoplaying ? "sequence-button-active" : ""}`,
                  type: "button",
                  onClick: handleToggleAutoplay
                },
                isAutoplaying ? "Stop Autoplay" : "Start Autoplay"
              )
            ),
            React.createElement(
              "p",
              { className: "sequence-status" },
              `Autoplay is ${isAutoplaying ? "running" : "stopped"} at ${autoplayIntervalMs} ms per step.`
            ),
            React.createElement(
              "section",
              { className: "selected-node-panel", "aria-label": "Selected node details" },
              React.createElement("p", { className: "eyebrow" }, "Selected Node"),
              selectedNode
                ? React.createElement(
                    React.Fragment,
                    null,
                    React.createElement("h2", null, selectedNode.label),
                    React.createElement(
                      "p",
                      { className: "selected-node-meta" },
                      `${selectedNode.graphTitle} · ${selectedNode.category}`
                    ),
                    React.createElement("p", null, selectedNode.summary)
                  )
                : React.createElement("p", null, "Click a node to inspect its data in parent state.")
            )
          ),
          React.createElement(
            "section",
            { className: "graph-panel", "aria-label": "Biblion graph previews" },
            React.createElement(GraphCard, {
              title: "Biblion Overview",
              description: `A minimal relationship map for the current documentation-facing website prototype. Sequence step ${sequenceStep + 1} of ${overviewSequence.length}.`,
              elements: overviewElements,
              layoutConfig: overviewLayout,
              onNodeSelect: setSelectedNode
            }),
            React.createElement(GraphCard, {
              title: "Guiding Principles",
              description: "A static graph derived from the principles outlined in THE_BIBLION_PROJECT.md.",
              elements: principlesElements,
              layoutConfig: principlesLayout,
              onNodeSelect: setSelectedNode
            })
          )
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
    </script>
  </body>
  </html>
